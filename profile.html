<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Profile</title><link rel="stylesheet" href="/assets/portal.css"><style>.profile-main{padding:34px}.profile-card{max-width:760px;margin:auto;background:white;border:1px solid #ccd4de;border-radius:6px;padding:24px;color:#111}.profile-card h1{margin:0 0 8px}.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}.profile-card label{font-weight:800;font-size:12px;color:#334155}.profile-card input{width:100%;height:38px;margin-top:6px;border:1px solid #bbb;border-radius:4px;padding:0 10px}.profile-card button{height:38px;margin-top:22px;padding:0 14px;border:1px solid #0ea5e9;background:#e0f2fe;color:#075985;border-radius:4px;font-weight:800;cursor:pointer}.muted{color:#667085}@media(max-width:700px){.profile-grid{grid-template-columns:1fr}}</style></head><body class="top-shell"><div id="nav"></div><main class="profile-main"><section class="profile-card"><h1>My Profile</h1><p class="muted">Profile and password page. This is separated from User Management.</p><div class="profile-grid"><div><label>Display Name</label><input id="displayName" placeholder="Display name"></div><div><label>Username</label><input id="username" disabled></div><div id="password"><label>New Password</label><input id="newPassword" type="password" placeholder="New password"></div><div><label>Confirm Password</label><input id="confirmPassword" type="password" placeholder="Confirm password"></div></div><button type="button" onclick="alert('Profile save API will be connected in the next user-management phase.')">Save Changes</button></section></main><script src="/assets/portal.js"></script><script>document.getElementById('nav').innerHTML=fmsNav('');currentUser().then(d=>{const u=d.user||{};username.value=u.username||'';displayName.value=u.display_name||u.name||'';});</script></body></html>
