<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Profile</title><link rel="stylesheet" href="/assets/portal.css"><style>
.profile-main{padding:34px;background:#d4dae2;min-height:calc(100vh - 48px)}.profile-card{max-width:760px;margin:auto;background:white;border:1px solid #b7c0ca;border-radius:6px;padding:24px;color:#111;box-shadow:0 2px 8px rgba(0,0,0,.08)}.profile-card h1{margin:0 0 8px}.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}.profile-card label{font-weight:800;font-size:12px;color:#334155}.profile-card input{width:100%;height:38px;margin-top:6px;border:1px solid #aeb8c5;border-radius:4px;padding:0 10px}.profile-card button{height:38px;margin-top:22px;padding:0 14px;border:1px solid #0ea5e9;background:#e0f2fe;color:#075985;border-radius:4px;font-weight:800;cursor:pointer}.muted{color:#667085}.msg{padding:10px;border-radius:6px;margin:12px 0}.msg.ok{background:#ecfdf5;border:1px solid #86efac;color:#047857}.msg.err{background:#fff1f2;border:1px solid #fecaca;color:#b91c1c}@media(max-width:700px){.profile-grid{grid-template-columns:1fr}}
</style></head><body class="top-shell"><div id="nav"></div><main class="profile-main"><section class="profile-card"><h1>👤 My Profile</h1><p class="muted">Update your display name or change your password.</p><div id="msg"></div><div class="profile-grid"><div><label>Display Name</label><input id="displayName" placeholder="Display name"></div><div><label>Username</label><input id="username" disabled></div><div id="passwordBlock"><label>Current Password</label><input id="currentPassword" type="password" placeholder="Required to change password"></div><div><label>New Password</label><input id="newPassword" type="password" placeholder="Leave blank to keep current"></div><div><label>Confirm New Password</label><input id="confirmPassword" type="password" placeholder="Repeat new password"></div></div><button id="saveBtn" type="button">Save Changes</button></section></main><script src="/assets/portal.js"></script><script>
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showMsg(t,type='ok'){msg.innerHTML='<div class="msg '+type+'">'+esc(t)+'</div>';}
let currentRole='';
saveBtn.onclick=async()=>{try{if(newPassword.value||confirmPassword.value){if(newPassword.value!==confirmPassword.value){showMsg('New password confirmation does not match.','err');return;}}showMsg('Saving...');const d=await api('/api/profile/save',{method:'POST',body:JSON.stringify({display_name:displayName.value.trim(),current_password:currentPassword.value,new_password:newPassword.value})});if(d.user){const old=authUser()||{};setPortalAuth(authToken(),{...old,display_name:d.user.display_name,name:d.user.display_name,role:d.user.role||old.role,username:d.user.username||old.username});}currentPassword.value=newPassword.value=confirmPassword.value='';showMsg('Profile updated successfully.');}catch(e){showMsg(e.data?.error||e.message,'err')}};
(async()=>{const access=await enforcePageAccess(['admin','user','viewer']);if(!access.ok)return;currentRole=access.role;document.getElementById('nav').innerHTML=fmsNav('',currentRole,access.user);const u=access.user||{};username.value=u.username||u.sub||'';displayName.value=u.display_name||u.name||'';})();
</script></body></html>
