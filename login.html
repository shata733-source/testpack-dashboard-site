<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CCC Login</title><link rel="stylesheet" href="/assets/portal.css"></head><body><main class="login-wrap"><section class="login-box"><div style="text-align:center"><img src="/assets/ccc-logo.png" style="width:90px;height:80px;object-fit:contain"><h1>CCC Employer Login</h1><p style="color:#9fb3ca">Sign in to project control platform.</p></div><div id="msg"></div><label>Username</label><input id="username" autocomplete="username"><label>Password</label><input id="password" type="password" autocomplete="current-password"><button class="login-btn" id="loginBtn">Login</button></section></main><script src="/assets/portal.js"></script><script>const q=new URLSearchParams(location.search);const next=q.get('next')||'/projects.html';document.getElementById('loginBtn').onclick=async()=>{const msg=document.getElementById('msg');msg.innerHTML='';try{await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:username.value.trim(),password:password.value})});location.href=next;}catch(e){msg.innerHTML='<div class="msg err">Login failed: '+(e.data?.error||e.message)+'</div>';}};</script></body></html>
