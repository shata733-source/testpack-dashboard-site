<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="/assets/app.css"></head><body><main class="wrap" style="max-width:520px"><section class="card hero"><h1>Login</h1><p class="muted">Sign in to Test Pack Dashboard.</p><div id="msg"></div><label>Username</label><input id="username" class="input" autocomplete="username"><label>Password</label><input id="password" class="input" type="password" autocomplete="current-password"><button class="btn" id="loginBtn">Login</button></section></main><script src="/assets/auth.js"></script><script>
const q=new URLSearchParams(location.search);const next=q.get('next')||'/dashboard.html';
document.getElementById('loginBtn').onclick=async()=>{const msg=document.getElementById('msg');msg.innerHTML='';try{await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:username.value.trim(),password:password.value})});location.href=next;}catch(e){msg.innerHTML='<div class="msg err">Login failed: '+(e.data?.error||e.message)+'</div>';}};
</script></body></html>
