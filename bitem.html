<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>B Item Control — CCC Control Platform</title>
<style>
:root{
  --bg:#060c18;--nav:#071225;--side:#0d1626;--panel:#0f1c2e;--panel2:#132033;
  --line:#1a3050;--line2:#1f3a5c;--text:#f0f4f8;--muted:#94a3b8;
  --accent:#00d4ff;--good:#10b981;--bad:#f97316;--danger:#ef4444;--yellow:#ffc400;
  --mono:Consolas,"JetBrains Mono","Courier New",monospace;--sans:Segoe UI,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
body.light{--bg:#dfe8f2;--nav:#0f201a;--side:#e8eef5;--panel:#fff;--panel2:#f3f7fb;--line:#c6d3e2;--line2:#b6c7da;--text:#0b1726;--muted:#42556d;--accent:#007da3}
button,input,select{font:inherit}
.top{height:62px;background:linear-gradient(135deg,#09142a,#0d1e38);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 24px rgba(0,0,0,.45)}
.brand{display:flex;align-items:center;gap:9px;min-width:220px;flex-shrink:0}.logo{width:42px;height:42px;object-fit:contain}.brand h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.25px}.brand p{margin:1px 0 0;color:var(--muted);font-size:11px;font-weight:700;font-family:var(--mono);line-height:1.25}
.top-actions{display:flex;align-items:center;gap:6px;flex:1;min-width:0}.btn{border:1px solid rgba(0,212,255,.35);background:rgba(0,212,255,.08);color:var(--accent);font-weight:800;border-radius:7px;padding:7px 12px;cursor:pointer;min-height:30px;font-size:12px;white-space:nowrap}.btn:hover{background:rgba(0,212,255,.16)}.btn.gray{background:#102035;color:#d7e8ff;border-color:#294561}.btn.home{margin-left:auto}.btn.good{background:#063b26;color:#b7ffcf;border-color:#22c55e}.btn.danger{background:#3b1116;color:#ffd1d1;border-color:#ef4444}.btn.warn{background:#44230b;color:#ffd7ad;border-color:#f97316}
.layout{display:grid;grid-template-columns:210px 1fr;height:calc(100% - 62px);min-height:0}.side{background:var(--side);border-right:1px solid var(--line);padding:14px 10px;overflow:auto}.filter-title{color:#4a6080;font-size:10px;letter-spacing:1.5px;font-weight:800;margin:13px 0 7px;text-transform:uppercase}.filter-title:first-child{margin-top:0}.side-btn,.side select{width:100%;height:34px;border:1px solid var(--line2);background:var(--panel2);color:var(--text);border-radius:6px;margin-bottom:7px;padding:0 10px;text-align:left;font-weight:700;font-size:12px}.side-btn.active{border-color:var(--accent);background:rgba(0,212,255,.08);color:#dffaff}.side-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:8px}
.main{padding:14px 20px;overflow:hidden;display:flex;flex-direction:column;gap:10px;min-width:0}.head{display:flex;align-items:flex-start;gap:16px;justify-content:space-between}.head h2{margin:0;font-size:24px;letter-spacing:-.4px}.head p{margin:6px 0 0;color:#9fb5cf;font-size:12px;line-height:1.35}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.search{min-width:360px;width:32vw;height:36px;background:#13223a;border:1px solid #26445f;color:var(--text);border-radius:7px;padding:0 13px;font-size:13px}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;min-height:0;flex:1;box-shadow:0 12px 30px rgba(0,0,0,.20)}.table-meta{display:flex;justify-content:space-between;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);color:#a8c8f0;font-weight:900;font-size:12px;font-family:var(--mono)}.table-wrap{overflow:auto;min-height:0;flex:1;scrollbar-color:#5b7798 #0c1726;scrollbar-width:thin}.grid{width:100%;border-collapse:collapse;table-layout:fixed;min-width:1660px}.grid th,.grid td{border-bottom:1px solid rgba(45,69,102,.55);padding:8px 10px;vertical-align:top;font-size:12px}.grid td{font-family:var(--mono);font-weight:800;line-height:1.25}.grid th{position:sticky;top:0;background:#15263c;color:#9fc0e8;text-transform:uppercase;font-size:11px;letter-spacing:.65px;z-index:3;font-family:var(--sans);font-weight:800}.grid tr:nth-child(even) td{background:rgba(255,255,255,.018)}.grid tr:hover td{background:rgba(0,212,255,.052)}.grid .filter-row th{top:36px;background:#08111f;z-index:2;padding:6px}.grid .filter-row input{width:100%;height:26px;border:1px solid #25476d;background:#07111e;color:var(--text);border-radius:6px;padding:0 8px;font-size:11px}
.act{width:78px}.narrow{width:90px}.medium{width:135px}.wide{width:360px}.note{width:330px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;border:1px solid #a54813;background:#301807;color:#ff7b22;font-weight:900;white-space:nowrap;font-size:11px;font-family:var(--sans)}.pill.clear{border-color:#15803d;background:#062d1b;color:#54e58b}.cell-date{font-weight:900;color:#e9f6ff}.cell-user{font-weight:900;color:var(--accent)}.cell-note{font-weight:900;color:var(--yellow);line-height:1.3}.editBtn{width:54px;min-height:34px;padding:6px 8px;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}.editbox{display:flex;align-items:center;gap:6px;background:#061827;border:1px solid rgba(0,212,255,.65);padding:4px;border-radius:8px;min-width:365px;position:relative;z-index:10}.editbox input{height:30px;width:132px;background:#07101e;color:#f8fafc;border:1px solid rgba(0,212,255,.55);border-radius:7px;padding:0 8px;font-weight:900}.editbox button{height:30px;border-radius:7px;font-size:11px;font-weight:900;cursor:pointer;opacity:1!important;filter:none!important;padding:0 9px}.pager{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line);background:#0d1929}.pager .spacer{flex:1}.small{font-size:12px;color:#aac6e8;font-weight:800;font-family:var(--mono)}.toast{position:fixed;right:18px;bottom:18px;z-index:9999;background:#092235;color:#dffaff;border:1px solid #00d4ff;border-radius:10px;padding:12px 14px;box-shadow:0 12px 28px rgba(0,0,0,.35);max-width:520px;font-weight:800}.toast.err{background:#34121a;color:#ffe0e0;border-color:#ef4444}.btn:disabled{opacity:.55!important;cursor:not-allowed!important;filter:grayscale(.15)}.editbox.is-saving{outline:1px solid rgba(16,185,129,.55);box-shadow:0 0 0 2px rgba(16,185,129,.10)}.loader{padding:28px;color:#a8c8f0;font-weight:900}.empty{padding:28px;color:var(--accent);font-weight:900}.hidden{display:none!important}
@media(max-width:900px){.layout{grid-template-columns:1fr}.side{display:none}.search{width:100%;min-width:0}.top{gap:8px;padding:0 10px}.brand{min-width:0}.brand h1{font-size:14px}.main{padding:12px}.head{display:block}.tools{justify-content:flex-start;margin-top:12px}}

/* === V28 visual polish + sticky action column === */
body.light{
  --bg:#eef4fa;--nav:#f8fbff;--side:#e7eff7;--panel:#ffffff;--panel2:#f6f9fd;
  --line:#c7d6e5;--line2:#aebfd3;--text:#102033;--muted:#506781;--accent:#007ea8;
}
body.light .top{background:linear-gradient(180deg,#f8fbff,#edf4fb);border-bottom-color:#b9c9db;box-shadow:0 2px 18px rgba(27,53,82,.12)}
body.light .btn{background:#e8f7fb;color:#007ea8;border-color:#9addec}body.light .btn.gray{background:#f4f7fb;color:#24425f;border-color:#bed0e2}
body.light .side{background:#e7eff7}body.light .side-btn,body.light .side select{background:#f8fbff;color:#132337;border-color:#b7cadc}body.light .side-btn.active{background:#dff5fb;color:#005c7c;border-color:#00a9d6}
body.light .main{background:#eef4fa}body.light .card{background:#fff;border-color:#c7d6e5;box-shadow:0 10px 24px rgba(35,62,92,.10)}
body.light .table-meta{background:#ffffff;color:#527096;border-bottom-color:#c7d6e5}
body.light .search{background:#ffffff;color:#132337;border-color:#b7cadc}body.light .search::placeholder{color:#6f8298}
body.light .grid th{background:#17314d;color:#bfe2ff;border-bottom-color:#244a70}body.light .grid .filter-row th{background:#0c1d31}
body.light .grid td{background:#ffffff;color:#071525;border-bottom-color:#c7d6e5}body.light .grid tr:nth-child(even) td{background:#f7fbff}body.light .grid tr:hover td{background:#eaf8fd}
body.light .grid .filter-row input{background:#f6f9fd;color:#102033;border-color:#97b1c9}
body.light .pager{background:#10243a;border-top-color:#254766}body.light .small{color:#d9ecff}
.grid th:first-child,.grid td:first-child{position:sticky;left:0;box-shadow:2px 0 0 var(--line);}
.grid th:first-child{z-index:30;background:#15263c}.grid .filter-row th:first-child{z-index:29;background:#08111f}.grid td:first-child{z-index:10;background:var(--panel)}
body.light .grid td:first-child{background:#fff}body.light .grid tr:nth-child(even) td:first-child{background:#f7fbff}body.light .grid tr:hover td:first-child{background:#eaf8fd}
.logo{display:block!important;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}.brand{min-width:235px}.brand h1{font-size:17px}.head h2{margin-top:2px}
.head p,.table-meta div:nth-child(2){display:none!important}

</style>
</head>

<script>
(function(){
'use strict';
const STATE={rows:[],total:0,offset:0,limit:100,page:1,filters:{contractor:'ALL',area:'ALL',stage:'ALL',status:'ALL',q:''},editing:null,user:null,canEdit:false,facetsReady:false,loadSeq:0,loadAbort:null,cacheTTL:180000,savingKeys:new Set()};
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function clean(v){return String(v??'').replace(/\s+/g,' ').trim();}
function isDateLike(v){return /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(clean(v))||/^\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}$/.test(clean(v));}
function validUserName(v){v=clean(v);return v && !isDateLike(v) ? v : '';}
function token(){try{return localStorage.getItem('ccc_bitem_auth_token')||sessionStorage.getItem('ccc_bitem_auth_token_session')||'';}catch(e){return '';}}
function cachedUser(){try{return JSON.parse(localStorage.getItem('ccc_bitem_auth_user')||sessionStorage.getItem('ccc_bitem_auth_user_session')||'null')||null;}catch(e){return null;}}
function saveUser(u){try{if(u){localStorage.setItem('ccc_bitem_auth_user',JSON.stringify(u));sessionStorage.setItem('ccc_bitem_auth_user_session',JSON.stringify(u));}}catch(e){}}
function authHeaders(json=false){const h={}; const t=token(); if(t)h.authorization='Bearer '+t; if(json)h['content-type']='application/json'; return h;}
function login(){location.href='/login?next='+encodeURIComponent(location.pathname+location.hash);}
function toast(msg,err=false){const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3600);} 
async function readJson(res){const txt=await res.text();try{return JSON.parse(txt);}catch(e){const ct=(res.headers&&res.headers.get('content-type')||'').toLowerCase(); if((txt||'').trim().startsWith('<')||ct.includes('text/html')) throw new Error('Backend returned HTML instead of JSON. Please retry after redeploy.'); throw new Error((txt||'').slice(0,180)||'Bad JSON response');}}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
async function fetchTextWithRetry(url,opt,tries=5){let last=null; for(let i=0;i<tries;i++){try{const res=await fetch(url,opt); const txt=await res.text(); const ct=(res.headers.get('content-type')||'').toLowerCase(); const html=(txt||'').trim().startsWith('<')||ct.includes('text/html'); if((res.status===502||res.status===503||res.status===504||html)&&i<tries-1){last=new Error('Temporary backend response '+res.status); await wait(650+Math.min(i*900,2600)); continue;} return {res,txt,html};}catch(e){last=e; if(e&&e.name==='AbortError') throw e; if(i<tries-1){await wait(650+Math.min(i*900,2600)); continue;} throw e;}} throw last||new Error('Request failed');}
function parseJsonPayload(res,txt,html){try{return JSON.parse(txt);}catch(e){if(html)throw new Error('Backend returned HTML instead of JSON.'); throw new Error((txt||'').slice(0,180)||'Bad JSON response');}}

function filterKey(page=STATE.page){
  return ['v53',page,STATE.limit,STATE.filters.contractor,STATE.filters.area,STATE.filters.stage,STATE.filters.status,STATE.filters.q].map(clean).join('|');
}
function cacheGet(key){
  try{
    const raw=sessionStorage.getItem('bitem_state_cache_'+key);
    if(!raw) return null;
    const obj=JSON.parse(raw);
    if(!obj || !obj.ts || Date.now()-obj.ts>STATE.cacheTTL) return null;
    return obj.data || null;
  }catch(e){return null;}
}
function cacheSet(key,data){
  try{
    sessionStorage.setItem('bitem_state_cache_'+key,JSON.stringify({ts:Date.now(),data:{total:Number(data.total||0),limit:Number(data.limit||STATE.limit),offset:Number(data.offset||STATE.offset),rows:data.rows||[]}}));
  }catch(e){}
}
function clearStateCaches(){
  try{
    Object.keys(sessionStorage).forEach(k=>{if(k.startsWith('bitem_state_cache_'))sessionStorage.removeItem(k);});
  }catch(e){}
}
function cacheCurrentPage(){
  try{cacheSet(filterKey(STATE.page),{total:STATE.total,limit:STATE.limit,offset:STATE.offset,rows:STATE.rows});}catch(e){}
}
function renderCachedData(data,page){
  if(!data) return false;
  STATE.page=page||STATE.page;
  STATE.rows=data.rows||[];
  STATE.total=Number(data.total||0);
  STATE.limit=Number(data.limit||STATE.limit)||STATE.limit;
  STATE.offset=Number(data.offset||((STATE.page-1)*STATE.limit));
  fillFacetsFromRows(STATE.rows);
  render();
  return true;
}

async function checkAuth(){const t=token(); if(!t){login();return false;} const local=cachedUser(); if(local){STATE.user=local; STATE.canEdit=(local.role==='admin'||(local.edit_pages||local.permissions?.edit||[]).includes('bitem'));}
 try{const res=await fetch('/api/auth/me',{headers:authHeaders(),cache:'no-store'}); const data=await readJson(res); if(!res.ok||!data.ok)throw new Error(data.error||'Unauthorized'); STATE.user=data.user||local; saveUser(STATE.user); const views=STATE.user.view_pages||STATE.user.permissions?.view||[]; const edits=STATE.user.edit_pages||STATE.user.permissions?.edit||[]; if(STATE.user.role!=='admin'&&!views.includes('bitem')){location.href='/projects';return false;} STATE.canEdit=STATE.user.role==='admin'||edits.includes('bitem'); return true;}catch(e){ if(!local){login();return false;} return true; }
}
function rowJson(r){try{return typeof r.row_json==='string'?JSON.parse(r.row_json||'{}'):(r.row_json||{});}catch(e){return {};}}
function val(r,names){const src=rowJson(r); for(const n of names){if(r[n]!=null&&clean(r[n]))return r[n]; if(src[n]!=null&&clean(src[n]))return src[n];} const keys=Object.keys(src||{}); for(const n of names){const target=n.toUpperCase().replace(/[^A-Z0-9]/g,''); const k=keys.find(x=>x.toUpperCase().replace(/[^A-Z0-9]/g,'')===target); if(k&&clean(src[k]))return src[k];} return '';}
function fmtDate(v){v=clean(v); if(!v)return ''; let m=v.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); if(m)return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`; m=v.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/); if(m){const y=m[3].length===2?'20'+m[3]:m[3];return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;} return v;}
function displayUser(r){return validUserName(r.user_cleared_by)||validUserName(r.last_edited_by)||'';}
function finalStatus(r){return clean(r.final_status).toUpperCase()==='CLEARED'?'CLEARED':'NOT CLEARED';}
function rowVisibleByStatus(r){return STATE.filters.status==='ALL'||finalStatus(r)===STATE.filters.status;}
function finalDate(r){return fmtDate(r.final_cleared_date||r.user_cleared_date||'');}
function pill(s){return `<span class="pill ${s==='CLEARED'?'clear':''}">${s==='CLEARED'?'✓ CLEARED':'NOT CLEARED'}</span>`;}
function rowKey(r){return clean(r.fingerprint)||clean(r.bitem_id);}

function containsAllowedAreaText(s){s=clean(s).toUpperCase();return ['A211','A212','A222','A231','A232','A233'].some(a=>s.includes(a));}
function effectiveContractor(r){
  const raw=clean(r.contractor).toUpperCase();
  const area=clean(r.area).toUpperCase();
  const hay=[r.area,r.comment_text,r.iso_or_spool,r.tp_no].map(clean).join(' ').toUpperCase();
  if(raw.includes('CCC') && (area==='GENERAL' || containsAllowedAreaText(hay))) return 'CCC';
  return 'JGC Direct MP';
}
function getCols(r){return {
 id:clean(r.bitem_id), tp:clean(r.tp_no), st:clean(r.construction_stage), date:fmtDate(val(r,['Date','DATE'])), area:clean(r.area), iso:clean(r.iso_or_spool), sheet:clean(val(r,['Sheet No.','Sheet No','Sheet Number','SheetNo'])), cat:clean(r.punch_category), mat:clean(r.material_type), comment:clean(r.comment_text), query:clean(r.query_status).toUpperCase()==='CLEARED'?'CLEARED':'NOT CLEARED', final:finalStatus(r), fdate:finalDate(r), user:displayUser(r), note:clean(r.sync_note), scope:effectiveContractor(r)};}
function render(){
 const rows=STATE.rows; const pageCount=Math.max(1,Math.ceil(STATE.total/STATE.limit)); $('#countText').textContent='B Item Rows: '+Number(STATE.total||0).toLocaleString(); $('#pageText').textContent=`Page ${STATE.page} / ${pageCount}`; $('#prevPage').disabled=STATE.page<=1; $('#nextPage').disabled=STATE.page>=pageCount;
 if(!rows.length){$('#wrap').innerHTML='<div class="empty">No B Item rows for current filters.</div>';return;}
 const head=['ACTION','B ITEM ID','TP NUMBER','STAGE','DATE','AREA','ISO NO.','SHEET NO.','PUNCH CATEGORY','MATERIAL TYPE','COMMENT','FMS / CCC EXCEL STATUS','FINAL STATUS','PUNCH CLEARED DATE','USER CLEARED','NOTE','SCOPE'];
 const cls=['act','medium','medium','medium','narrow','narrow','medium','narrow','narrow','medium','wide','medium','medium','medium','medium','note','medium'];
 let html='<table class="grid"><thead><tr>'+head.map((h,i)=>`<th class="${cls[i]||''}">${h}</th>`).join('')+'</tr><tr class="filter-row">'+head.map((h,i)=>i===0?'<th></th>':`<th><input data-col="${i}" placeholder="Filter..."></th>`).join('')+'</tr></thead><tbody>';
 rows.forEach(r=>{const c=getCols(r); html+=`<tr data-key="${esc(rowKey(r))}" data-id="${esc(r.bitem_id)}" data-fp="${esc(r.fingerprint)}">
 <td><button class="btn editBtn" ${STATE.canEdit?'':'disabled'}>✏️ Edit</button></td><td>${esc(c.id)}</td><td>${esc(c.tp)}</td><td>${esc(c.st)}</td><td>${esc(c.date)}</td><td>${esc(c.area)}</td><td>${esc(c.iso)}</td><td>${esc(c.sheet)}</td><td>${esc(c.cat)}</td><td>${esc(c.mat)}</td><td>${esc(c.comment)}</td><td>${pill(c.query)}</td><td class="finalCell">${pill(c.final)}</td><td class="dateCell cell-date">${esc(c.fdate)}</td><td class="userCell cell-user">${esc(c.user)}</td><td class="cell-note">${esc(c.note)}</td><td>${esc(c.scope)}</td></tr>`;});
 html+='</tbody></table>'; $('#wrap').innerHTML=html; const w=$('#wrap'); if(w) w.scrollLeft=0; bindTable();
}
function bindTable(){ $$('.editBtn').forEach(b=>b.onclick=e=>{e.stopPropagation(); const tr=b.closest('tr'); const r=findRow(tr); if(r) openEditor(tr,r);}); $$('.filter-row input').forEach(inp=>inp.oninput=clientColumnFilter);}
function clientColumnFilter(){const filters={}; $$('.filter-row input').forEach(i=>{if(clean(i.value))filters[i.dataset.col]=clean(i.value).toUpperCase();}); $$('#wrap tbody tr').forEach(tr=>{let ok=true; Object.entries(filters).forEach(([idx,q])=>{const cell=tr.children[Number(idx)]; if(cell&&!cell.textContent.toUpperCase().includes(q))ok=false;}); tr.style.display=ok?'':'none';});}
function findRow(tr){const key=tr&&tr.dataset.key; return STATE.rows.find(r=>rowKey(r)===key);}
function closeEditor(){if(!STATE.editing)return; const {tr,row}=STATE.editing; patchRow(tr,row); STATE.editing=null;}
function setEditorBusy(box,busy){
 if(!box)return;
 box.classList.toggle('is-saving',!!busy);
 box.querySelectorAll('button,input').forEach(el=>{el.disabled=!!busy;});
}
function openEditor(tr,row){
 if(!STATE.canEdit){toast('View only account. Editing is disabled.',true);return;}
 const key=rowKey(row);
 if(STATE.savingKeys.has(key)){toast('This row is already saving. Please wait.',true);return;}
 closeEditor();
 STATE.editing={tr,row};
 const td=tr.querySelector('.dateCell');
 const current=fmtDate(row.final_cleared_date||row.user_cleared_date||'');
 td.innerHTML=`<div class="editbox"><input type="date" value="${esc(current)}"><button class="btn" data-cal>📅</button><button class="btn good" data-save>✓ Save</button><button class="btn warn" data-clear>Clear</button><button class="btn danger" data-cancel>×</button></div>`;
 const box=td.querySelector('.editbox');
 box.onclick=ev=>ev.stopPropagation(); box.onmousedown=ev=>ev.stopPropagation();
 const inp=box.querySelector('input');
 box.querySelector('[data-cal]').onclick=ev=>{ev.stopPropagation(); inp.focus(); try{inp.showPicker&&inp.showPicker();}catch(e){}};
 box.querySelector('[data-cancel]').onclick=ev=>{ev.stopPropagation(); if(!STATE.savingKeys.has(key))closeEditor();};
 box.querySelector('[data-save]').onclick=ev=>{ev.stopPropagation(); if(!fmtDate(inp.value)){toast('Please select a date or use Clear.',true);return;} commit(row,fmtDate(inp.value),false,tr);};
 box.querySelector('[data-clear]').onclick=ev=>{ev.stopPropagation(); if(confirm('Remove Punch Cleared Date? The user name will remain as last editor.')) commit(row,'',true,tr);};
 inp.onkeydown=ev=>{if(ev.key==='Enter'){ev.preventDefault(); box.querySelector('[data-save]').click();} if(ev.key==='Escape'){ev.preventDefault(); box.querySelector('[data-cancel]').click();}};
}
function patchRow(tr,row){if(!tr)return; const c=getCols(row); const f=tr.querySelector('.finalCell'), d=tr.querySelector('.dateCell'), u=tr.querySelector('.userCell'); if(f)f.innerHTML=pill(c.final); if(d)d.textContent=c.fdate; if(u)u.textContent=c.user; const note=tr.querySelector('.cell-note'); if(note)note.textContent=c.note;}
async function commit(row,iso,clearDate,tr){
 const key=rowKey(row);
 if(STATE.savingKeys.has(key)){toast('Save already in progress. Please wait.',true);return;}
 const box=tr&&tr.querySelector('.editbox');
 STATE.savingKeys.add(key); setEditorBusy(box,true);
 try{
  const payload={bitem_id:row.bitem_id||'',fingerprint:row.fingerprint||'',punch_cleared:iso||'',clear_date:clearDate?'1':'0',remarks:clearDate?'User removed Punch Cleared date':'Inline Punch Cleared update'};
  const out=await fetchTextWithRetry('/api/bitem/save',{method:'POST',headers:authHeaders(true),body:JSON.stringify(payload),cache:'no-store'},3);
  const data=parseJsonPayload(out.res,out.txt,out.html);
  if(!out.res.ok||!data.ok)throw new Error(data.error||'Save failed');
  const updated=Object.assign({},row,data.row||{}, {user_cleared_by:data.user_cleared_by||data.last_edited_by||(STATE.user&&STATE.user.display_name)||row.user_cleared_by});
  const idx=STATE.rows.findIndex(x=>rowKey(x)===rowKey(row));
  if(idx>=0)STATE.rows[idx]=updated;
  clearStateCaches();
  STATE.editing=null;
  if(STATE.filters.status!=='ALL' && !rowVisibleByStatus(updated)){
    STATE.rows=STATE.rows.filter(x=>rowKey(x)!==key);
    STATE.total=Math.max(0,Number(STATE.total||0)-1);
    render();
  }else{
    patchRow(tr,updated);
    cacheCurrentPage();
  }
  toast(clearDate?'Date cleared.':'Saved.');
 }catch(e){
  toast(e.message||String(e),true);
  setEditorBusy(box,false);
 }finally{
  STATE.savingKeys.delete(key);
 }
}
async function load(page=STATE.page, opts={}){
 STATE.page=Math.max(1,page); STATE.limit=Number($('#pageSize').value||100); STATE.offset=(STATE.page-1)*STATE.limit;
 const seq=++STATE.loadSeq;
 if(STATE.loadAbort){try{STATE.loadAbort.abort();}catch(e){}}
 STATE.loadAbort=('AbortController' in window)?new AbortController():null;
 const key=filterKey(STATE.page);
 const cached=!opts.force ? cacheGet(key) : null;
 const usedCache=renderCachedData(cached,STATE.page);
 if(!usedCache){
  if(!STATE.rows.length) $('#wrap').innerHTML='<div class="loader">Loading B Item rows...</div>';
  else $('#countText').textContent='B Item Rows: loading...';
 }else{
  $('#countText').textContent='B Item Rows: '+Number(STATE.total||0).toLocaleString()+'  ·  updating...';
 }
 const p=new URLSearchParams({limit:STATE.limit,offset:STATE.offset,include_removed:'0',t:Date.now()});
 if(opts.force)p.set('no_cache','1');
 if(STATE.filters.q)p.set('q',STATE.filters.q); if(STATE.filters.contractor!=='ALL')p.set('contractor',STATE.filters.contractor); if(STATE.filters.area!=='ALL')p.set('area',STATE.filters.area); if(STATE.filters.stage!=='ALL')p.set('stage',STATE.filters.stage); if(STATE.filters.status!=='ALL')p.set('final_status',STATE.filters.status);
 try{
  const out=await fetchTextWithRetry('/api/bitem/state?'+p,{headers:authHeaders(),cache:'no-store',signal:STATE.loadAbort?STATE.loadAbort.signal:undefined},4);
  if(seq!==STATE.loadSeq) return;
  const data=parseJsonPayload(out.res,out.txt,out.html);
  if(!out.res.ok||!data.ok)throw new Error(data.error||('B Item state failed HTTP '+out.res.status));
  STATE.rows=data.rows||[]; STATE.total=Number(data.total||0); fillFacetsFromRows(STATE.rows); render(); cacheSet(key,{total:STATE.total,limit:STATE.limit,offset:STATE.offset,rows:STATE.rows}); loadFacetsOnce();
 }catch(e){
  if(e&&e.name==='AbortError') return;
  if(seq!==STATE.loadSeq) return;
  const msg=e.message||String(e);
  if(usedCache || STATE.rows.length){toast('B Item backend is slow; showing the last loaded rows.',true); render();}
  else $('#wrap').innerHTML='<div class="empty">B Item load failed: '+esc(msg)+'</div>';
 }}
function fillFacets(f){const area=$('#areaSel'), stage=$('#stageSel'); if(area.options.length<=1){(f.areas||[]).forEach(v=>area.add(new Option(v,v)));} if(stage.options.length<=1){(f.stages||[]).forEach(v=>stage.add(new Option(v,v)));}}
function addOptionOnce(sel,v){v=clean(v); if(!v||v.toUpperCase()==='ALL')return; if(!Array.from(sel.options).some(o=>o.value===v)) sel.add(new Option(v,v));}
function fillFacetsFromRows(rows){const area=$('#areaSel'), stage=$('#stageSel'); (rows||[]).forEach(r=>{addOptionOnce(area,r.area); addOptionOnce(stage,r.construction_stage);});}
let facetsLoading=false;
async function loadFacetsOnce(){
 if(STATE.facetsReady||facetsLoading) return;
 facetsLoading=true;
 try{
  const cached=sessionStorage.getItem('bitem_facets_cache_v53');
  if(cached){
    const obj=JSON.parse(cached);
    if(obj && obj.ts && Date.now()-obj.ts<600000 && obj.facets){fillFacets(obj.facets); STATE.facetsReady=true; facetsLoading=false; return;}
  }
 }catch(e){}
 try{
  const out=await fetchTextWithRetry('/api/bitem/facets?t='+Date.now(),{headers:authHeaders(),cache:'no-store'},2);
  const data=parseJsonPayload(out.res,out.txt,out.html);
  if(out.res.ok&&data&&data.ok){fillFacets(data.facets||{}); STATE.facetsReady=true; try{sessionStorage.setItem('bitem_facets_cache_v53',JSON.stringify({ts:Date.now(),facets:data.facets||{}}));}catch(e){}}
 }catch(e){/* facets are optional; table must never fail because of them */}
 facetsLoading=false;
}
function applyFilters(){STATE.filters.q=clean($('#q').value); STATE.filters.area=$('#areaSel').value; STATE.filters.stage=$('#stageSel').value; STATE.filters.status=$('#statusSel').value; load(1);} 
function exportCsv(){const headers=['B Item ID','TP Number','Stage','Area','ISO','Sheet','Punch Category','Material Type','Comment','FMS/CCC Excel Status','Final Status','Punch Cleared Date','User Cleared','Note','Scope']; const lines=[headers.join(',')]; STATE.rows.forEach(r=>{const c=getCols(r); const vals=[c.id,c.tp,c.st,c.area,c.iso,c.sheet,c.cat,c.mat,c.comment,c.query,c.final,c.fdate,c.user,c.note,c.scope].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"'); lines.push(vals.join(','));}); const blob=new Blob([lines.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='B_Item_Current_Page.csv'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),500);}
function boot(){ $('#reloadBtn').onclick=()=>load(STATE.page,{force:true}); $('#exportBtn').onclick=exportCsv; $('#pageSize').onchange=()=>load(1); $('#prevPage').onclick=()=>load(STATE.page-1); $('#nextPage').onclick=()=>load(STATE.page+1); $('#areaSel').onchange=applyFilters; $('#stageSel').onchange=applyFilters; $('#statusSel').onchange=applyFilters; $('#resetFilters').onclick=()=>{STATE.filters={contractor:'ALL',area:'ALL',stage:'ALL',status:'ALL',q:''}; $('#q').value=''; $('#areaSel').value='ALL'; $('#stageSel').value='ALL'; $('#statusSel').value='ALL'; $$('.side-btn[data-contractor]').forEach(x=>x.classList.toggle('active',x.dataset.contractor==='ALL')); load(1);}; let timer=null; $('#q').oninput=()=>{clearTimeout(timer); timer=setTimeout(applyFilters,500);}; $$('.side-btn[data-contractor]').forEach(btn=>btn.onclick=()=>{$$('.side-btn[data-contractor]').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); STATE.filters.contractor=btn.dataset.contractor; load(1);}); function updateThemeBtn(){const isLight=document.body.classList.contains('light'); $('#themeBtn').textContent=isLight?'🌙 Dark':'☀ Light';}
 $('#themeBtn').onclick=()=>{document.body.classList.toggle('light'); localStorage.setItem('tpDashTheme',document.body.classList.contains('light')?'light':'dark'); updateThemeBtn();}; if(localStorage.getItem('tpDashTheme')==='light')document.body.classList.add('light'); updateThemeBtn(); ['prevBtn','applyBtn','exportListBtn','clearDeltasBtn'].forEach(id=>{const b=document.getElementById(id); if(b)b.onclick=()=>toast('This control belongs to the main dashboard. B Item Control reads directly from D1.');}); checkAuth().then(ok=>{if(ok)load(1);});}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot); else boot();
})();
</script>
