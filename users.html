<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>User Management</title><link rel="stylesheet" href="/assets/app.css"></head><body><script src="/assets/auth.js"></script><script>document.write(navHtml('users'));</script><main class="wrap"><section class="card"><div class="row"><div><h2>👥 User Management</h2><p class="muted">Create users, set roles, disable accounts, and review activity.</p></div><div class="spacer"></div><button class="btn" onclick="loadUsers()">↻ Reload</button></div><div id="msg"></div></section><section class="grid" style="grid-template-columns:360px 1fr;margin-top:16px"><div class="card"><h3 id="formTitle">Create User</h3><input id="uid" type="hidden"><label>Username</label><input class="input" id="u_username"><label>Display Name</label><input class="input" id="u_name"><label>Password</label><input class="input" id="u_password" type="password" placeholder="Leave blank when editing"><label>Role</label><select id="u_role"><option value="viewer">Viewer</option><option value="user">User</option><option value="admin">Admin</option></select><label>Status</label><select id="u_active"><option value="1">Active</option><option value="0">Disabled</option></select><div class="row"><button class="btn" onclick="saveUser()">💾 Save</button><button class="btn" onclick="resetForm()">Clear</button></div></div><div class="card"><h3>Users</h3><div style="overflow:auto"><table><thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Status</th><th>Last Login</th><th>IP</th><th>Action</th></tr></thead><tbody id="usersBody"><tr><td colspan="7">Loading...</td></tr></tbody></table></div></div></section><section class="card" style="margin-top:16px"><h3>Activity Logs</h3><div style="overflow:auto"><table><thead><tr><th>Time</th><th>Action</th><th>User</th><th>Details</th></tr></thead><tbody id="logsBody"><tr><td colspan="4">Loading...</td></tr></tbody></table></div></section></main><script>
let current=[];
function show(type,text){document.getElementById('msg').innerHTML='<div class="msg '+(type==='err'?'err':'ok')+'">'+text+'</div>';setTimeout(()=>msg.innerHTML='',4000)}
function rolePill(r){return '<span class="pill '+r+'">'+String(r||'viewer').toUpperCase()+'</span>'}
function activePill(a){return a?'<span class="pill ok">ACTIVE</span>':'<span class="pill off">DISABLED</span>'}
async function loadUsers(){
  try{await requireAdmin(); const data=await api('/api/users/list'); current=data.users||[]; renderUsers(current); renderLogs(data.logs||[]);}catch(e){show('err',e.data?.error||e.message)}
}
function renderUsers(rows){usersBody.innerHTML=rows.map(u=>`<tr><td>${u.username||''}</td><td>${u.display_name||u.name||''}</td><td>${rolePill(u.role)}</td><td>${activePill(Number(u.active)!==0)}</td><td>${u.last_login_at||''}</td><td>${u.last_login_ip||''}</td><td><button class="btn" onclick='editUser(${JSON.stringify(u).replace(/'/g,"&#39;")})'>Edit</button> <button class="btn" onclick="toggleUser('${u.username}',${Number(u.active)!==0?0:1})">${Number(u.active)!==0?'Disable':'Enable'}</button> <button class="btn" onclick="deleteUser('${u.username}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="7">No users yet.</td></tr>';}
function renderLogs(rows){logsBody.innerHTML=rows.map(l=>`<tr><td>${l.created_at||l.time||''}</td><td>${l.action||''}</td><td>${l.username||l.user||''}</td><td>${l.details||''}</td></tr>`).join('')||'<tr><td colspan="4">No logs yet.</td></tr>';}
function editUser(u){uid.value=u.username||'';u_username.value=u.username||'';u_username.disabled=true;u_name.value=u.display_name||u.name||'';u_password.value='';u_role.value=u.role||'viewer';u_active.value=(Number(u.active)!==0?'1':'0');formTitle.textContent='Edit User';}
function resetForm(){uid.value='';u_username.disabled=false;u_username.value='';u_name.value='';u_password.value='';u_role.value='viewer';u_active.value='1';formTitle.textContent='Create User';}
async function saveUser(){try{await api('/api/users/save',{method:'POST',body:JSON.stringify({username:u_username.value.trim(),display_name:u_name.value.trim(),password:u_password.value,role:u_role.value,active:u_active.value==='1'})});show('ok','Saved');resetForm();loadUsers();}catch(e){show('err',e.data?.error||e.message)}}
async function toggleUser(username,active){try{await api('/api/users/toggle',{method:'POST',body:JSON.stringify({username,active})});loadUsers();}catch(e){show('err',e.data?.error||e.message)}}
async function deleteUser(username){if(!confirm('Delete user '+username+'?'))return;try{await api('/api/users/delete',{method:'POST',body:JSON.stringify({username})});loadUsers();}catch(e){show('err',e.data?.error||e.message)}}
loadUsers();
</script></body></html>
