<!doctype html><html><head><meta charset="utf-8"><title>User Management</title><link rel="stylesheet" href="assets/app.css"></head><body><script src="assets/js/common.js"></script><script>shell('users','User Management')</script><main class="dark-page"><a class="btn ghost" href="projects.html">🏠 Home</a><h1>User Management</h1><div class="section"><div class="row"><input id="username" class="input" placeholder="Username"><input id="displayName" class="input" placeholder="Display Name"><input id="password" class="input" placeholder="Password"><select id="role" class="input"><option>viewer</option><option>user</option><option>admin</option></select><button class="btn primary" onclick="saveUser()">Create / Update</button></div></div><div class="section"><table class="table"><thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Status</th><th>Last Login</th><th>Action</th></tr></thead><tbody id="users"><tr><td colspan="6">Loading...</td></tr></tbody></table></div></main><script>async function loadUsers(){const d=await api('/api/users/list'); const arr=d.rows||d.users||[]; users.innerHTML=arr.map(u=>`<tr><td>${u.username}</td><td>${u.display_name||u.displayName||''}</td><td>${u.role||''}</td><td>${u.active===0?'Disabled':'Active'}</td><td>${u.last_login_at||''}</td><td><button class="btn ghost" onclick="toggleUser('${u.username}')">Toggle</button></td></tr>`).join('')||'<tr><td colspan="6">No users loaded.</td></tr>'} async function saveUser(){await api('/api/users/save',{method:'POST',body:JSON.stringify({username:username.value,displayName:displayName.value,password:password.value,role:role.value,active:1})}); loadUsers()} async function toggleUser(u){await api('/api/users/toggle',{method:'POST',body:JSON.stringify({username:u})}); loadUsers()} loadUsers();</script></body></html>
