<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>User Management</title><link rel="stylesheet" href="/assets/portal.css"><style>.admin-main{padding:28px}.admin-card{background:white;border:1px solid #ccd4de;border-radius:4px;padding:20px;color:#111}.admin-card input,.admin-card select{height:36px;padding:0 10px;margin:4px;border:1px solid #bbb}.admin-card button{height:36px;padding:0 12px;margin:4px;cursor:pointer}.tbl{width:100%;border-collapse:collapse;margin-top:15px}.tbl th,.tbl td{border-bottom:1px solid #e5e7eb;padding:10px;text-align:left}.muted{color:#667085}</style></head><body class="top-shell"><div id="nav"></div><main class="admin-main"><section class="admin-card"><h1>User Management</h1><p class="muted">Admin page separated from dashboard.</p><div><input id="username" placeholder="Username"><input id="displayName" placeholder="Display name"><input id="password" placeholder="Password" type="password"><select id="role"><option>viewer</option><option>user</option><option>admin</option></select><button id="saveBtn">Create / Update</button></div><div id="msg" class="muted"></div><table class="tbl"><thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Status</th><th>Last Login</th><th>Action</th></tr></thead><tbody id="usersBody"><tr><td colspan="6">Loading...</td></tr></tbody></table></section></main><script src="/assets/portal.js"></script><script>document.getElementById('nav').innerHTML=fmsNav('monitor');let current=null;async function loadUsers(){try{const d=await api('/api/users/list');const rows=d.users||[];usersBody.innerHTML=rows.map(u=>`<tr><td>${u.username}</td><td>${u.display_name||''}</td><td>${u.role}</td><td>${u.active?'Active':'Disabled'}</td><td>${u.last_login_at||''}</td><td><button onclick="editUser('${u.username}','${u.display_name||''}','${u.role}')">Edit</button><button onclick="toggleUser('${u.username}')">${u.active?'Disable':'Enable'}</button><button onclick="deleteUser('${u.username}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="6">No users</td></tr>'}catch(e){usersBody.innerHTML='<tr><td colspan="6">Failed: '+(e.data?.error||e.message)+'</td></tr>'}}function editUser(u,n,r){current=u;username.value=u;displayName.value=n;role.value=r;password.value=''}async function toggleUser(u){await api('/api/users/toggle',{method:'POST',body:JSON.stringify({username:u})});loadUsers()}async function deleteUser(u){if(confirm('Delete '+u+'?')){await api('/api/users/delete',{method:'POST',body:JSON.stringify({username:u})});loadUsers()}}saveBtn.onclick=async()=>{msg.textContent='Saving...';try{await api('/api/users/save',{method:'POST',body:JSON.stringify({username:username.value.trim(),display_name:displayName.value.trim(),password:password.value,role:role.value})});msg.textContent='Saved';username.value=displayName.value=password.value='';loadUsers()}catch(e){msg.textContent='Failed: '+(e.data?.error||e.message)}};loadUsers();</script></body></html>
